server {
    listen 80;
    server_name _;  # Replace with your domain, e.g. example.com

    # Logs
    access_log /var/log/nginx/shg-bank.access.log;
    error_log  /var/log/nginx/shg-bank.error.log;

    # Proxy all requests to the FastAPI/uvicorn app
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Required for WebSocket support (uvicorn reload uses WS)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # Serve static files directly via nginx (faster than going through Python)
    location /static/ {
        alias /path/to/your/project/frontend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Optional: increase max upload size
    client_max_body_size 10M;
}
